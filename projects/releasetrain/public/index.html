<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Releasetrain</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Releasetrain</h1>
      <p class="lede">Ship services through planned → staging → prod with checklist gates and dual approval.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@releasetrain.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Release lane</h2>
        <label>Train <input id="train-name" type="text" value="Platform train" /></label>
        <label>Service <input id="service-name" type="text" value="billing-api" /></label>
        <label>Version <input id="release-version" type="text" value="1.0.0" /></label>
        <div class="row">
          <button type="button" id="start">Plan release</button>
          <button type="button" id="checklist" disabled>Add checklist</button>
          <button type="button" id="staging" disabled>Promote staging</button>
          <button type="button" id="approve" disabled>Approve (×2 needed)</button>
          <button type="button" id="prod" disabled>Ship prod</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

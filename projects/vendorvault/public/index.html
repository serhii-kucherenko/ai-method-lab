<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendorvault</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Vendorvault</h1>
      <p class="lede">Track vendor findings from open to remediated to accepted.</p>
      <section id="auth">
        <label>Email <input id="email" value="demo@vendorvault.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <label>Workspace <input id="ws" value="Risk ops" /></label>
        <label>Vendor <input id="vendor" value="Acme Cloud" /></label>
        <div class="row">
          <button type="button" id="start">Open finding</button>
          <button type="button" id="remediate" disabled>Remediate</button>
          <button type="button" id="accept" disabled>Accept</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

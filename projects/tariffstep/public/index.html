<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tariffstep</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Tariffstep</h1>
      <p>Stepped energy blocks plus demand ratchet (workflow experiment).</p>
      <label>Total kWh <input id="kwh" type="number" value="180" /></label>
      <label>Current peak kW <input id="cur" type="number" value="12" /></label>
      <label>Prior peak kW <input id="prior" type="number" value="10" /></label>
      <label>Ratchet % <input id="ratchet" type="number" step="0.01" value="0.8" /></label>
      <label>Demand rate <input id="dr" type="number" value="9" /></label>
      <button id="go" type="button">Bill</button>
      <pre id="out"></pre>
    </main>
    <script src="/app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Compiler Desk — goldens</title>
    <style>
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #1c2430;
        background: linear-gradient(180deg, #eef3f6, #e4ebf0);
        min-height: 100vh;
      }
      main {
        max-width: 44rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        margin: 0 0 0.4rem;
        font-family: "IBM Plex Serif", Georgia, serif;
      }
      p { color: #4a5564; line-height: 1.5; }
      a { color: #0f6b6b; }
      .pass { color: #1b5e3b; }
      .fail { color: #7a1f1f; }
      #goldens-out {
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        background: #f4f7fa;
        border: 1px solid #c9d2dc;
        padding: 0.85rem;
        overflow: auto;
      }
    </style>
  </head>
  <body data-goldens="live">
    <main>
      <h1>Goldens browser</h1>
      <p>
        Paper-inspired modularity fixtures versus the live pass-layer scorer
        (≥25 cards). Lab sketch only — not the authors' compiler.
      </p>
      <p id="summary">Loading…</p>
      <pre id="goldens-out"></pre>
      <p>
        <a href="/">Home</a> ·
        <a href="/scenario.html">Scenario</a> ·
        <a href="/honesty.html">Honesty</a>
      </p>
    </main>
    <script>
      (function () {
        const token = localStorage.getItem("mcd_token") || "";
        const orgId = localStorage.getItem("mcd_org") || "";
        const summary = document.getElementById("summary");
        const out = document.getElementById("goldens-out");
        if (!token || !orgId) {
          summary.textContent =
            "Set mcd_token and mcd_org in localStorage, then reload.";
          return;
        }
        fetch("/orgs/" + orgId + "/goldens", {
          headers: { authorization: "Bearer " + token },
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            summary.className = j.all_pass ? "pass" : "fail";
            summary.textContent =
              "total " + j.total + " · all_pass=" + j.all_pass;
            out.textContent = JSON.stringify(j.cards, null, 2);
          })
          .catch(function (e) {
            summary.textContent = String(e);
          });
      })();
    </script>
  </body>
</html>

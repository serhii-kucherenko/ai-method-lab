<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Compiler Desk — org settings</title>
    <style>
      :root {
        --ink: #1c2430;
        --muted: #4a5564;
        --accent: #0f6b6b;
        --panel: #f4f7fa;
        --line: #c9d2dc;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 0%, #dcecf0 0%, transparent 45%),
          linear-gradient(180deg, #eef3f6, #e4ebf0);
        min-height: 100vh;
      }
      main {
        max-width: 40rem;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 3rem;
      }
      h1 {
        font-family: "IBM Plex Serif", Georgia, serif;
        font-size: clamp(1.6rem, 3.5vw, 2rem);
        margin: 0 0 0.5rem;
      }
      p { color: var(--muted); line-height: 1.5; }
      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        padding: 0.5rem 1rem;
        cursor: pointer;
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
      }
      #settings-out {
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 0.85rem 1rem;
        margin-top: 1rem;
      }
      a { color: var(--accent); }
      code { font-size: 0.9em; }
    </style>
  </head>
  <body data-settings="live">
    <main>
      <h1>Org settings</h1>
      <p>
        Admin-only webhook HMAC secret and token notes. Operators and viewers see
        redacted settings. Inbound signed posts use header
        <code>x-mcd-signature</code>.
      </p>
      <p>
        <button id="load-settings" type="button">Load settings</button>
        <button id="rotate-secret" type="button">Rotate webhook secret</button>
      </p>
      <pre id="settings-out">Load to view</pre>
      <p>
        <a href="/">Home</a> ·
        <a href="/jobs.html">Jobs</a> ·
        <a href="/honesty.html">Honesty</a>
      </p>
    </main>
    <script>
      (function () {
        const token = localStorage.getItem("mcd_token") || "";
        const orgId = localStorage.getItem("mcd_org") || "";
        const out = document.getElementById("settings-out");
        function load() {
          if (!token || !orgId) {
            out.textContent = "Set mcd_token and mcd_org in localStorage.";
            return;
          }
          fetch("/orgs/" + orgId + "/settings", {
            headers: { authorization: "Bearer " + token },
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (j) {
              out.textContent = JSON.stringify(j, null, 2);
            });
        }
        document.getElementById("load-settings").onclick = load;
        document.getElementById("rotate-secret").onclick = function () {
          fetch("/orgs/" + orgId + "/settings", {
            method: "PATCH",
            headers: {
              "content-type": "application/json",
              authorization: "Bearer " + token,
            },
            body: JSON.stringify({ rotate_webhook_secret: true }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (j) {
              out.textContent = JSON.stringify(j, null, 2);
            });
        };
      })();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waitlist</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Waitlist</h1>
      <p class="lede">Join the waitlist, invite it, and join it.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@waitlist.local" /></label>
        <label>Password <input id="entryword" type="entryword" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Clip</h2>
        <label>Title <input id="title" type="text" value="Kickoff entries" /></label>
        <div class="row">
          <button type="button" id="create">Join wait</button>
          <button type="button" id="invite" disabled>Invite</button>
          <button type="button" id="join" disabled>Join</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="entry-view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

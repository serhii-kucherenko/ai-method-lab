<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grantlane</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Grantlane</h1>
      <p class="lede">Review, activate, and disburse grants with dual sign-off and milestone budgets.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@grantlane.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Grant lane</h2>
        <label>Program <input id="program-name" type="text" value="Community fund" /></label>
        <label>Applicant org <input id="org-name" type="text" value="River Arts Collective" /></label>
        <label>Amount requested <input id="amount-requested" type="number" value="10000" /></label>
        <div class="row">
          <button type="button" id="start">Submit application</button>
          <button type="button" id="signoff" disabled>Dual sign-off</button>
          <button type="button" id="activate" disabled>Activate grant</button>
          <button type="button" id="pay" disabled>Pay milestone</button>
          <button type="button" id="close" disabled>Close grant</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lesserof — goldens</title>
    <style>
      body {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 44rem;
        margin-inline: auto;
        background: #eef0f5;
        color: #1a1c22;
      }
      .brand { font-weight: 700; font-size: 1.5rem; color: #3a4f8c; }
      #cards { list-style: none; padding: 0; }
      #cards li { padding: 0.45rem 0; border-bottom: 1px solid #d4d8e0; font-size: 0.9rem; }
      .pass { color: #1f6b3a; }
      .fail { color: #7a1f1f; }
      a { color: #3a4f8c; }
    </style>
  </head>
  <body>
    <div class="brand">lesserof</div>
    <h1>Golden cards</h1>
    <p id="status">Provide ?token= and ?orgId=.</p>
    <ul id="cards" data-goldens="live"></ul>
    <p><a href="/lane-compare.html">Lane compare</a> · <a href="/honesty.html">Honesty</a></p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token = params.get("token") || localStorage.getItem("lesserof_token") || "";
        const orgId = params.get("orgId") || localStorage.getItem("lesserof_orgId") || "";
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("cards");
        if (!token || !orgId) return;
        fetch("/orgs/" + encodeURIComponent(orgId) + "/goldens", {
          headers: { authorization: "Bearer " + token },
        })
          .then(function (res) {
            return res.json().then(function (json) {
              return { status: res.status, json: json };
            });
          })
          .then(function (result) {
            if (result.status !== 200) {
              statusEl.textContent = "Failed (" + result.status + ").";
              return;
            }
            statusEl.textContent =
              result.json.total +
              " cards · all_pass=" +
              result.json.all_pass;
            listEl.innerHTML = "";
            (result.json.cards || []).forEach(function (card) {
              const li = document.createElement("li");
              li.className = card.pass ? "pass" : "fail";
              li.textContent =
                (card.pass ? "PASS" : "FAIL") +
                " · " +
                card.id +
                " · " +
                card.expect_status;
              listEl.appendChild(li);
            });
          });
      })();
    </script>
  </body>
</html>

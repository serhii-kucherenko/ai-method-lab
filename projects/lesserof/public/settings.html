<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lesserof — org settings</title>
    <style>
      body {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 36rem;
        margin-inline: auto;
        background: #eef0f5;
        color: #1a1c22;
      }
      .brand { font-weight: 700; font-size: 1.5rem; color: #3a4f8c; }
      button {
        background: #3a4f8c;
        color: #fff;
        border: 0;
        padding: 0.55rem 1rem;
        cursor: pointer;
        margin-top: 0.75rem;
      }
      #out { font-family: ui-monospace, monospace; font-size: 0.85rem; white-space: pre-wrap; }
      a { color: #3a4f8c; }
    </style>
  </head>
  <body>
    <div class="brand">lesserof</div>
    <h1>Org settings</h1>
    <p data-settings="live">
      Webhook HMAC secret and token notes. Admin can rotate the webhook secret.
      Auditors see redacted settings.
    </p>
    <p id="status">Provide ?token= and ?orgId=.</p>
    <button id="load" type="button">Load settings</button>
    <button id="rotate" type="button">Rotate webhook secret</button>
    <pre id="out"></pre>
    <p><a href="/claim-lines.html">Catalog</a> · <a href="/audit.html">Audit</a></p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token = params.get("token") || localStorage.getItem("lesserof_token") || "";
        const orgId = params.get("orgId") || localStorage.getItem("lesserof_orgId") || "";
        const statusEl = document.getElementById("status");
        const out = document.getElementById("out");
        function load() {
          if (!token || !orgId) {
            statusEl.textContent = "Need ?token= and ?orgId=.";
            return;
          }
          fetch("/orgs/" + encodeURIComponent(orgId) + "/settings", {
            headers: { authorization: "Bearer " + token },
          })
            .then(function (res) {
              return res.json().then(function (json) {
                return { status: res.status, json: json };
              });
            })
            .then(function (result) {
              statusEl.textContent = "Loaded (" + result.status + ").";
              out.textContent = JSON.stringify(result.json, null, 2);
            });
        }
        document.getElementById("load").onclick = load;
        document.getElementById("rotate").onclick = function () {
          if (!token || !orgId) return;
          fetch("/orgs/" + encodeURIComponent(orgId) + "/settings", {
            method: "PATCH",
            headers: {
              authorization: "Bearer " + token,
              "content-type": "application/json",
            },
            body: JSON.stringify({ rotate_webhook_secret: true }),
          })
            .then(function (res) {
              return res.json().then(function (json) {
                return { status: res.status, json: json };
              });
            })
            .then(function (result) {
              statusEl.textContent = "Rotated (" + result.status + ").";
              out.textContent = JSON.stringify(result.json, null, 2);
            });
        };
      })();
    </script>
  </body>
</html>

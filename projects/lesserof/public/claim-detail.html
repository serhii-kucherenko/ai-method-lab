<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lesserof — claim detail</title>
    <style>
      body {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 40rem;
        margin-inline: auto;
        color: #1a1c22;
        background: #eef0f5;
      }
      .brand {
        font-weight: 700;
        font-size: 1.5rem;
        color: #3a4f8c;
      }
      #status {
        color: #5a6170;
      }
      .money {
        font-variant-numeric: tabular-nums;
        font-size: 1.25rem;
      }
      a {
        color: #3a4f8c;
      }
    </style>
  </head>
  <body>
    <div class="brand">lesserof</div>
    <h1>Claim line detail</h1>
    <p id="status">Loading…</p>
    <div id="detail" hidden>
      <p id="meta"></p>
      <p class="money" id="recover-out" data-recover="live"></p>
      <p id="wipe-note" hidden>
        Partner duty-free wipe on this stacked substitution line → recoverable
        <strong>$0</strong>.
      </p>
    </div>
    <p>
      <a href="/claim-lines.html">Catalog</a> ·
      <a href="/honesty.html">Money honesty</a>
    </p>
    <p>Specialists still file. Naive 99% of paid is wrong on substitution.</p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token =
          params.get("token") || localStorage.getItem("lesserof_token") || "";
        const orgId =
          params.get("orgId") || localStorage.getItem("lesserof_orgId") || "";
        const lineId =
          params.get("lineId") || localStorage.getItem("lesserof_lineId") || "";
        const statusEl = document.getElementById("status");
        const detail = document.getElementById("detail");
        const meta = document.getElementById("meta");
        const recoverOut = document.getElementById("recover-out");
        const wipeNote = document.getElementById("wipe-note");
        if (!token || !orgId || !lineId) {
          statusEl.textContent = "Provide ?token=, ?orgId=, and ?lineId=.";
          return;
        }
        const base =
          "/orgs/" + encodeURIComponent(orgId) + "/claim-lines/" + encodeURIComponent(lineId);
        fetch(base, { headers: { authorization: "Bearer " + token } })
          .then(function (res) {
            return res.json().then(function (json) {
              return { status: res.status, json: json };
            });
          })
          .then(function (result) {
            if (result.status !== 200) {
              statusEl.textContent = "Failed to load line (" + result.status + ").";
              return;
            }
            const line = result.json.claim_line;
            detail.hidden = false;
            meta.textContent =
              line.claim_type +
              " · paid " +
              line.duties_paid +
              " · substitute " +
              line.substitute_basis +
              (line.apply_usmca_lesser_of
                ? " · USMCA partner " + line.usmca_partner_duty
                : "");
            return fetch(base + "/recover", {
              method: "POST",
              headers: { authorization: "Bearer " + token },
            }).then(function (res) {
              return res.json().then(function (json) {
                return { status: res.status, json: json, line: line };
              });
            });
          })
          .then(function (result) {
            if (!result) return;
            if (result.status !== 200) {
              statusEl.textContent = "Recover failed (" + result.status + ").";
              return;
            }
            statusEl.textContent = "Recovered.";
            if (result.json.status === "ok") {
              recoverOut.textContent =
                "Recoverable: $" + Number(result.json.refund).toFixed(2);
              if (
                result.line.apply_usmca_lesser_of &&
                result.line.usmca_partner_duty === 0 &&
                result.json.refund === 0
              ) {
                wipeNote.hidden = false;
              }
            } else {
              recoverOut.textContent = "Reject: " + result.json.reason;
            }
          })
          .catch(function () {
            statusEl.textContent = "Network error.";
          });
      })();
    </script>
  </body>
</html>

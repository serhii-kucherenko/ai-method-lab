<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lesserof — claim lines</title>
    <style>
      body {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 40rem;
        margin-inline: auto;
        color: #1a1c22;
        background: #eef0f5;
      }
      .brand {
        font-weight: 700;
        font-size: 1.5rem;
        color: #3a4f8c;
      }
      #status {
        color: #5a6170;
      }
      #lines-list {
        list-style: none;
        padding: 0;
      }
      #lines-list li {
        padding: 0.75rem 0;
        border-bottom: 1px solid #d4d8e0;
      }
      a {
        color: #3a4f8c;
      }
    </style>
  </head>
  <body>
    <div class="brand">lesserof</div>
    <h1>Claim lines catalog</h1>
    <p id="status">Loading…</p>
    <ul id="lines-list" data-catalog="live"></ul>
    <p>
      <a href="/honesty.html">Money honesty</a> ·
      <a href="/claim-detail.html">Claim detail</a>
    </p>
    <p>Brokers and drawback specialists still file. This is a stacked-cap forecast experiment.</p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token =
          params.get("token") || localStorage.getItem("lesserof_token") || "";
        const orgId =
          params.get("orgId") || localStorage.getItem("lesserof_orgId") || "";
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("lines-list");
        if (!token || !orgId) {
          statusEl.textContent =
            "Provide ?token= and ?orgId= (or localStorage lesserof_token / lesserof_orgId).";
          return;
        }
        fetch("/orgs/" + encodeURIComponent(orgId) + "/claim-lines", {
          headers: { authorization: "Bearer " + token },
        })
          .then(function (res) {
            return res.json().then(function (json) {
              return { status: res.status, json: json };
            });
          })
          .then(function (result) {
            if (result.status !== 200) {
              statusEl.textContent = "Failed to load (" + result.status + ").";
              return;
            }
            const lines = result.json.claim_lines || [];
            statusEl.textContent = lines.length + " claim line(s).";
            listEl.innerHTML = "";
            lines.forEach(function (line) {
              const li = document.createElement("li");
              const link =
                "/claim-detail.html?orgId=" +
                encodeURIComponent(orgId) +
                "&lineId=" +
                encodeURIComponent(line.id) +
                "&token=" +
                encodeURIComponent(token);
              li.innerHTML =
                "<a href=\"" +
                link +
                "\">" +
                line.claim_type +
                "</a> · paid " +
                line.duties_paid +
                " / sub " +
                line.substitute_basis;
              listEl.appendChild(li);
            });
          })
          .catch(function () {
            statusEl.textContent = "Network error.";
          });
      })();
    </script>
  </body>
</html>

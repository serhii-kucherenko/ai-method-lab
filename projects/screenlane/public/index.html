<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Screenlane</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Screenlane</h1>
      <p class="lede">Screen candidates with scorecards — applied to screening to decided.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@screenlane.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Screening lane</h2>
        <label>Board name <input id="board-name" type="text" value="Eng hiring" /></label>
        <label>Job title <input id="job-title" type="text" value="Backend engineer" /></label>
        <label>Candidate <input id="cand-name" type="text" value="Alex Rivera" /></label>
        <div class="row">
          <button type="button" id="start">Start applied</button>
          <button type="button" id="screen" disabled>Enter screening</button>
          <button type="button" id="score" disabled>Score 4/5</button>
          <button type="button" id="hire" disabled>Decide hired</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

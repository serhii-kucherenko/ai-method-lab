<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rules Preferences Desk — goldens</title>
    <style>
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #1a2433;
        background: linear-gradient(180deg, #eef4f8, #e2ebf1);
        min-height: 100vh;
      }
      main {
        max-width: 44rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        margin: 0 0 0.4rem;
        font-family: "Fraunces", Georgia, serif;
      }
      p {
        color: #4d5b6d;
        line-height: 1.5;
      }
      a {
        color: #1f5f8b;
      }
      .pass {
        color: #1b5e3b;
      }
      .fail {
        color: #7a1f1f;
      }
      #goldens-out {
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        background: #f3f7f9;
        border: 1px solid #c5d0dc;
        padding: 0.85rem;
        overflow: auto;
      }
    </style>
  </head>
  <body data-goldens="live">
    <main>
      <h1>Goldens browser</h1>
      <p>
        Paper-inspired virulence-fit fixtures versus the live dual scorer
        (≥25 cards). Lab sketch only — not the authors' packing checklist system.
      </p>
      <p id="summary">Loading…</p>
      <pre id="goldens-out"></pre>
      <p>
        <a href="/">Home</a> ·
        <a href="/scenario.html">Scenario</a> ·
        <a href="/honesty.html">Honesty</a>
      </p>
    </main>
    <script>
      (function () {
        const token = localStorage.getItem("EAD_token") || "";
        const orgId = localStorage.getItem("EAD_org") || "";
        const summary = document.getElementById("summary");
        const out = document.getElementById("goldens-out");
        if (!token || !orgId) {
          summary.textContent =
            "Set EAD_token and EAD_org in localStorage, then reload.";
          return;
        }
        fetch("/orgs/" + orgId + "/goldens", {
          headers: { authorization: "Bearer " + token },
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            summary.className = j.all_pass ? "pass" : "fail";
            summary.textContent =
              "total " + j.total + " · all_pass=" + j.all_pass;
            out.textContent = JSON.stringify(j.cards, null, 2);
          })
          .catch(function (e) {
            summary.textContent = String(e);
          });
      })();
    </script>
  </body>
</html>

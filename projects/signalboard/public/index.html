<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signalboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Signalboard</h1>
      <p class="lede">Post a status, submit for review, and publish it.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@signalboard.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Status</h2>
        <label>Title <input id="title" type="text" value="All systems nominal" /></label>
        <label>Details <textarea id="body">Latency within SLO.</textarea></label>
        <div class="row">
          <button type="button" id="create">Create draft</button>
          <button type="button" id="submit" disabled>Submit</button>
          <button type="button" id="approve" disabled>Publish</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="status-view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

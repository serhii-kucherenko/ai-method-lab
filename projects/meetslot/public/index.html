<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meetslot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Meetslot</h1>
      <p class="lede">Hold a room, confirm it, and complete it.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@meetslot.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Booking</h2>
        <label>Room <input id="room" type="text" value="Boardroom" /></label>
        <div class="row">
          <button type="button" id="create">Hold</button>
          <button type="button" id="confirm" disabled>Confirm</button>
          <button type="button" id="complete" disabled>Complete</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="booking-view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crewleg</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Crewleg</h1>
      <p>FAR 117 Table B pairing check (method stress).</p>
      <label>Report (HHMM) <input id="report" value="0800" /></label>
      <label>Segments <input id="segments" type="number" value="2" /></label>
      <label>FDP hours <input id="fdp" type="number" step="0.1" value="13.5" /></label>
      <label><input id="acclimated" type="checkbox" checked /> Acclimated</label>
      <button id="go" type="button">Evaluate</button>
      <pre id="out"></pre>
    </main>
    <script src="/app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Depositgap — Entry detail</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem 1.5rem;
        background: #f7f3eb;
        color: #1a2332;
      }
      .brand { color: #0d6e6e; font-weight: 700; font-size: 1.5rem; }
      h1 { font-size: 1.2rem; }
      a { color: #0d6e6e; }
      #status { color: #4a5568; margin: 1rem 0; }
      dl {
        display: grid;
        grid-template-columns: 10rem 1fr;
        gap: 0.4rem 1rem;
        max-width: 36rem;
        margin: 1rem 0;
      }
      dt { color: #4a5568; }
      dd { margin: 0; font-family: ui-monospace, monospace; }
      button {
        background: #0d6e6e;
        color: #fff;
        border: 0;
        padding: 0.6rem 1.1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #forecast-result {
        margin-top: 1.25rem;
        padding: 1rem;
        border-left: 3px solid #0d6e6e;
        max-width: 36rem;
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="brand">Depositgap</div>
    <h1>Entry detail</h1>
    <p>
      Deposit vs assessed facts and run true-up forecast. Remember: deposit ≠ final.
    </p>
    <p id="status">Loading…</p>
    <dl id="entry-fields" data-detail="live"></dl>
    <button id="run-forecast" type="button" disabled>Run forecast</button>
    <pre id="forecast-result" hidden></pre>
    <p>
      <a href="/money-honesty.html">Money honesty</a> ·
      <a id="catalog-link" href="/entries.html">Catalog</a>
    </p>
    <p>
      Brokers and CBP still own liquidation. This is a forecast / method experiment.
    </p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token =
          params.get("token") ||
          localStorage.getItem("depositgap_token") ||
          "";
        const orgId =
          params.get("orgId") ||
          localStorage.getItem("depositgap_orgId") ||
          "";
        const entryId =
          params.get("entryId") ||
          params.get("id") ||
          localStorage.getItem("depositgap_entryId") ||
          "";
        const statusEl = document.getElementById("status");
        const fieldsEl = document.getElementById("entry-fields");
        const btn = document.getElementById("run-forecast");
        const resultEl = document.getElementById("forecast-result");
        const catalog = document.getElementById("catalog-link");

        if (token && orgId) {
          catalog.href =
            "/entries.html?orgId=" +
            encodeURIComponent(orgId) +
            "&token=" +
            encodeURIComponent(token);
        }

        if (!token || !orgId || !entryId) {
          statusEl.textContent =
            "Provide ?token=, ?orgId=, and ?entryId= (or localStorage stubs).";
          return;
        }

        const base =
          "/orgs/" +
          encodeURIComponent(orgId) +
          "/entries/" +
          encodeURIComponent(entryId);

        function showFields(entry) {
          const pairs = [
            ["id", entry.id],
            ["order_type", entry.order_type],
            ["rate_class", entry.rate_class],
            ["deposit_rate", entry.deposit_rate],
            ["assessed_rate", entry.assessed_rate],
            ["entered_value", entry.entered_value],
            ["order_published_on", entry.order_published_on],
            ["liquidated_on", entry.liquidated_on],
            ["interest_annual_rate", entry.interest_annual_rate],
            ["skip_interest", entry.skip_interest],
          ];
          fieldsEl.innerHTML = "";
          pairs.forEach(function (pair) {
            const dt = document.createElement("dt");
            dt.textContent = pair[0];
            const dd = document.createElement("dd");
            dd.textContent = String(pair[1]);
            fieldsEl.appendChild(dt);
            fieldsEl.appendChild(dd);
          });
        }

        fetch(base, { headers: { authorization: "Bearer " + token } })
          .then(function (res) {
            return res.json().then(function (json) {
              return { status: res.status, json: json };
            });
          })
          .then(function (result) {
            if (result.status !== 200) {
              statusEl.textContent =
                "Failed to load entry (" + result.status + ").";
              return;
            }
            statusEl.textContent = "Entry loaded.";
            showFields(result.json.entry);
            btn.disabled = false;
          })
          .catch(function () {
            statusEl.textContent = "Network error loading entry.";
          });

        btn.addEventListener("click", function () {
          btn.disabled = true;
          statusEl.textContent = "Running forecast…";
          fetch(base + "/forecast", {
            method: "POST",
            headers: {
              authorization: "Bearer " + token,
              "content-type": "application/json",
            },
            body: "{}",
          })
            .then(function (res) {
              return res.json().then(function (json) {
                return { status: res.status, json: json };
              });
            })
            .then(function (result) {
              resultEl.hidden = false;
              resultEl.textContent = JSON.stringify(result.json, null, 2);
              statusEl.textContent =
                result.status === 200
                  ? "Forecast locked (duty_delta + interest shown separately)."
                  : "Forecast failed (" + result.status + ").";
              btn.disabled = false;
            })
            .catch(function () {
              statusEl.textContent = "Network error running forecast.";
              btn.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>

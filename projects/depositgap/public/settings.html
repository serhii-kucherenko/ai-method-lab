<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Depositgap — Org settings</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem 1.5rem;
        background: #f7f3eb;
        color: #1a2332;
      }
      .brand { color: #0d6e6e; font-weight: 700; font-size: 1.5rem; }
      h1 { font-size: 1.2rem; }
      a { color: #0d6e6e; }
      #status { color: #4a5568; margin: 1rem 0; }
      label { display: block; margin-top: 1rem; font-size: 0.9rem; }
      input, textarea {
        display: block;
        width: min(40rem, 100%);
        margin-top: 0.35rem;
        padding: 0.5rem 0.6rem;
        font: inherit;
        border: 1px solid #d5cdc0;
        background: #fff;
      }
      textarea { min-height: 4rem; font-family: ui-monospace, monospace; }
      .actions { margin-top: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
      button {
        padding: 0.5rem 0.9rem;
        background: #0d6e6e;
        color: #fff;
        border: 0;
        cursor: pointer;
      }
      button.secondary { background: #4a5568; }
      .note { max-width: 36rem; color: #4a5568; line-height: 1.45; }
      #form-panel[data-settings="live"] { max-width: 40rem; }
    </style>
  </head>
  <body>
    <div class="brand">Depositgap</div>
    <h1>Org settings</h1>
    <p class="note">
      Admin can view and save the webhook secret and tokens note. Auditors see a redacted view.
      Brokers and CBP still own liquidation — this is a forecast / method experiment.
    </p>
    <p id="status">Loading…</p>
    <div id="form-panel" data-settings="live" hidden>
      <label>
        Webhook secret (HMAC SHA-256)
        <input id="webhook-secret" type="text" autocomplete="off" />
      </label>
      <label>
        Tokens note
        <textarea id="tokens-note"></textarea>
      </label>
      <p id="token-count" class="note"></p>
      <div class="actions">
        <button id="save" type="button">Save settings</button>
        <button id="rotate" type="button" class="secondary">Rotate webhook secret</button>
      </div>
    </div>
    <p>
      <a href="/entries.html">Catalog</a> ·
      <a href="/money-honesty.html">Money honesty</a> ·
      <a href="/audit.html">Audit</a>
    </p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token =
          params.get("token") ||
          localStorage.getItem("depositgap_token") ||
          "";
        const orgId =
          params.get("orgId") ||
          localStorage.getItem("depositgap_orgId") ||
          "";
        const status = document.getElementById("status");
        const panel = document.getElementById("form-panel");
        const secretInput = document.getElementById("webhook-secret");
        const noteInput = document.getElementById("tokens-note");
        const tokenCount = document.getElementById("token-count");
        const saveBtn = document.getElementById("save");
        const rotateBtn = document.getElementById("rotate");

        if (!token || !orgId) {
          status.textContent =
            "Provide ?token= and ?orgId= (or set localStorage depositgap_token / depositgap_orgId).";
          return;
        }

        function applyAdmin(settings) {
          panel.hidden = false;
          secretInput.value = settings.webhook_secret || "";
          noteInput.value = settings.tokens_note || "";
          tokenCount.textContent =
            "Bearer tokens for org members: " + (settings.token_count || 0);
          status.textContent = "Admin view — load and save webhook secret / tokens note.";
        }

        function applyRedacted(settings) {
          panel.hidden = true;
          status.textContent =
            settings.note ||
            "Webhook secret and tokens note are admin only.";
        }

        fetch("/orgs/" + encodeURIComponent(orgId) + "/settings", {
          headers: { authorization: "Bearer " + token },
        })
          .then(function (res) {
            return res.json().then(function (json) {
              return { status: res.status, json: json };
            });
          })
          .then(function (result) {
            if (result.status !== 200) {
              status.textContent =
                "Failed to load settings (" +
                result.status +
                ").";
              return;
            }
            const settings = result.json.settings || {};
            if (settings.webhook_secret) {
              applyAdmin(settings);
            } else {
              applyRedacted(settings);
            }
          })
          .catch(function () {
            status.textContent = "Network error loading settings.";
          });

        saveBtn.addEventListener("click", function () {
          fetch("/orgs/" + encodeURIComponent(orgId) + "/settings", {
            method: "PATCH",
            headers: {
              authorization: "Bearer " + token,
              "content-type": "application/json",
            },
            body: JSON.stringify({
              webhook_secret: secretInput.value,
              tokens_note: noteInput.value,
            }),
          })
            .then(function (res) {
              return res.json().then(function (json) {
                return { status: res.status, json: json };
              });
            })
            .then(function (result) {
              if (result.status !== 200) {
                status.textContent =
                  "Save failed: " + (result.json.error || result.status);
                return;
              }
              applyAdmin(result.json.settings || {});
              status.textContent = "Settings saved.";
            });
        });

        rotateBtn.addEventListener("click", function () {
          fetch("/orgs/" + encodeURIComponent(orgId) + "/settings", {
            method: "PATCH",
            headers: {
              authorization: "Bearer " + token,
              "content-type": "application/json",
            },
            body: JSON.stringify({ rotate_webhook_secret: true }),
          })
            .then(function (res) {
              return res.json().then(function (json) {
                return { status: res.status, json: json };
              });
            })
            .then(function (result) {
              if (result.status !== 200) {
                status.textContent =
                  "Rotate failed: " + (result.json.error || result.status);
                return;
              }
              applyAdmin(result.json.settings || {});
              status.textContent = "Secret rotated.";
            });
        });
      })();
    </script>
  </body>
</html>

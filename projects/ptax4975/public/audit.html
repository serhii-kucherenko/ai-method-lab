<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ptax4975 — Audit log</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem 1.5rem;
        background: #eef2f5;
        color: #1c2430;
      }
      .brand { color: #1f5f8b; font-weight: 700; font-size: 1.5rem; }
      h1 { font-size: 1.2rem; }
      a { color: #1f5f8b; }
      #status { color: #4d5a6a; margin: 1rem 0; }
      #audit-list {
        list-style: none;
        padding: 0;
        margin: 1rem 0;
        max-width: 44rem;
      }
      #audit-list li {
        padding: 0.75rem 0;
        border-bottom: 1px solid #c5ced8;
        font-size: 0.95rem;
      }
      .meta { font-size: 0.85rem; color: #4d5a6a; font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <div class="brand">ptax4975</div>
    <h1>Audit log</h1>
    <p>
      Forecast locks and rejects for this org. Export CSV for auditor review.
    </p>
    <p id="status">Loading…</p>
    <p>
      <a id="csv-link" href="#">Download CSV</a>
    </p>
    <ul id="audit-list" data-audit="live"></ul>
    <p>
      <a href="/transactions.html">Catalog</a> ·
      <a href="/batch.html">Batch</a> ·
      <a href="/money-honesty.html">Money honesty</a>
    </p>
    <p>
      Kill A: counsel and Form 5330 preparers still win. Forecast / method
      experiment — not Form 5330 / IRS / DOL replacement.
    </p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token =
          params.get("token") ||
          localStorage.getItem("ptax4975_token") ||
          "";
        const orgId =
          params.get("orgId") ||
          localStorage.getItem("ptax4975_orgId") ||
          "";
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("audit-list");
        const csvLink = document.getElementById("csv-link");

        if (!token || !orgId) {
          statusEl.textContent =
            "Stub: set ptax4975_token + ptax4975_orgId to load /orgs/:id/audit.";
          return;
        }

        csvLink.href =
          "/orgs/" +
          encodeURIComponent(orgId) +
          "/audit?format=csv";
        csvLink.addEventListener("click", function (e) {
          e.preventDefault();
          fetch(csvLink.href, {
            headers: { Authorization: "Bearer " + token },
          })
            .then(function (r) {
              return r.text();
            })
            .then(function (text) {
              const blob = new Blob([text], { type: "text/csv" });
              const a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = "audit.csv";
              a.click();
            });
        });

        fetch("/orgs/" + encodeURIComponent(orgId) + "/audit", {
          headers: { Authorization: "Bearer " + token },
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            const events = j.events || [];
            statusEl.textContent = events.length + " events";
            listEl.innerHTML = events
              .map(function (ev) {
                return (
                  "<li>" +
                  ev.action +
                  " · " +
                  ev.status +
                  "<div class='meta'>" +
                  ev.transaction_id +
                  (ev.total != null ? " · total=" + ev.total : "") +
                  (ev.reason ? " · " + ev.reason : "") +
                  "</div></li>"
                );
              })
              .join("");
          })
          .catch(function () {
            statusEl.textContent = "Load failed";
          });
      })();
    </script>
  </body>
</html>

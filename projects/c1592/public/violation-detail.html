<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>c1592 — violation detail</title>
    <style>
      body {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 40rem;
        margin-inline: auto;
        color: #1a2228;
        background: #eef2f4;
      }
      label { display: grid; gap: 0.25rem; margin-bottom: 0.6rem; }
      button {
        background: #1f5f6b;
        color: #fff;
        border: 0;
        padding: 0.55rem 0.85rem;
        cursor: pointer;
      }
      #out { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 0.85rem; }
      a { color: #1f5f6b; }
    </style>
  </head>
  <body data-detail="live">
    <h1>Violation detail</h1>
    <p>Edit facts and run the statutory-max forecast (<code>/forecast</code>).</p>
    <form id="f">
      <label>Culpability
        <select id="culpability">
          <option value="negligence">negligence</option>
          <option value="gross_negligence">gross_negligence</option>
          <option value="fraud">fraud</option>
        </select>
      </label>
      <label>Duty loss <input id="duty_loss" type="number" value="100000" /></label>
      <label>Domestic value <input id="domestic_value" type="number" value="500000" /></label>
      <label>Dutiable value <input id="dutiable_value" type="number" value="100000" /></label>
      <button type="submit" id="run-forecast">Run forecast</button>
    </form>
    <pre id="out"></pre>
    <p><a href="/violations.html">Catalog</a> · <a href="/money-honesty.html">Honesty</a></p>
    <script>
      const token = localStorage.getItem("c1592_token") || "";
      const orgId = localStorage.getItem("c1592_org") || "";
      const out = document.getElementById("out");
      document.getElementById("f").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!token || !orgId) {
          out.textContent = "Set c1592_token and c1592_org in localStorage.";
          return;
        }
        const body = {
          culpability: document.getElementById("culpability").value,
          duty_loss: Number(document.getElementById("duty_loss").value),
          domestic_value: Number(document.getElementById("domestic_value").value),
          dutiable_value: Number(document.getElementById("dutiable_value").value),
        };
        const created = await fetch("/orgs/" + orgId + "/violations", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            authorization: "Bearer " + token,
          },
          body: JSON.stringify(body),
        }).then((r) => r.json());
        const id = created.violation && created.violation.id;
        if (!id) {
          out.textContent = JSON.stringify(created, null, 2);
          return;
        }
        const forecast = await fetch(
          "/orgs/" + orgId + "/violations/" + id + "/forecast",
          {
            method: "POST",
            headers: { authorization: "Bearer " + token },
          },
        ).then((r) => r.json());
        out.textContent = JSON.stringify(
          { penalty_max: forecast.penalty_max, branch: forecast.branch, raw: forecast },
          null,
          2,
        );
      });
    </script>
  </body>
</html>

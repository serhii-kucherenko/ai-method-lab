<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>c1592 — audit</title>
    <style>
      body {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 44rem;
        margin-inline: auto;
        color: #1a2228;
        background: #eef2f4;
      }
      .brand { font-weight: 700; font-size: 1.5rem; color: #1f5f6b; }
      #events { list-style: none; padding: 0; }
      #events li { padding: 0.5rem 0; border-bottom: 1px solid #d0d8dc; font-size: 0.9rem; }
      a { color: #1f5f6b; }
    </style>
  </head>
  <body>
    <div class="brand">c1592</div>
    <h1>Audit trail</h1>
    <p>Append-only forecast runs. CSV export via API <code>?format=csv</code>.</p>
    <p id="status">Loading…</p>
    <ul id="events" data-audit="live"></ul>
    <p>
      <a href="/batch.html">Batch</a> ·
      <a href="/violations.html">Catalog</a> ·
      <a href="/money-honesty.html">Honesty</a>
    </p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token = params.get("token") || localStorage.getItem("c1592_token") || "";
        const orgId = params.get("orgId") || localStorage.getItem("c1592_org") || "";
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("events");
        if (!token || !orgId) {
          statusEl.textContent = "Need ?token= and ?orgId=.";
          return;
        }
        fetch("/orgs/" + encodeURIComponent(orgId) + "/audit", {
          headers: { authorization: "Bearer " + token },
        })
          .then(function (res) {
            return res.json().then(function (json) {
              return { status: res.status, json: json };
            });
          })
          .then(function (result) {
            if (result.status !== 200) {
              statusEl.textContent = "Failed (" + result.status + ").";
              return;
            }
            const events = result.json.events || [];
            statusEl.textContent = events.length + " event(s) (total " + result.json.total + ").";
            listEl.innerHTML = "";
            events.forEach(function (ev) {
              const li = document.createElement("li");
              li.textContent =
                ev.created_at +
                " · " +
                ev.status +
                " · violation " +
                (ev.violation_id || "—") +
                (ev.status === "ok"
                  ? " max $" + ev.penalty_max
                  : " " + (ev.reason || ""));
              listEl.appendChild(li);
            });
          });
      })();
    </script>
  </body>
</html>

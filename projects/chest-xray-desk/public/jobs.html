<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chest Xray Desk — jobs</title>
    <style>
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #1a2433;
        background: linear-gradient(180deg, #eef4f8, #e2ebf1);
        min-height: 100vh;
      }
      main {
        max-width: 44rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        margin: 0 0 0.4rem;
        font-family: "Sora", Georgia, serif;
      }
      p,
      label {
        color: #4d5b6d;
      }
      a {
        color: #1f5f8b;
      }
      form {
        display: grid;
        gap: 0.6rem;
        margin: 1.25rem 0;
        padding: 1rem;
        background: #f3f7f9;
        border: 1px solid #c5d0dc;
      }
      input,
      button {
        font: inherit;
        padding: 0.45rem 0.6rem;
      }
      button {
        background: #1f5f8b;
        color: #fff;
        border: 0;
        cursor: pointer;
        width: fit-content;
      }
      pre {
        background: #1a2433;
        color: #e8eef3;
        padding: 0.85rem;
        overflow: auto;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body data-jobs="live">
    <main>
      <h1>Study jobs</h1>
      <p>
        Create a project and queue a study job through
        the bearer API. Token is kept in <code>ESD_token</code> for this browser
        session.
      </p>
      <p><a href="/">Home</a> · <a href="/honesty.html">Honesty</a></p>
      <form id="job-form">
        <label>
          Bearer token
          <input
            id="token"
            name="token"
            autocomplete="off"
            placeholder="from /auth/register"
          />
        </label>
        <label>
          Org id
          <input id="orgId" name="orgId" autocomplete="off" />
        </label>
        <label>
          Project name
          <input id="projectName" name="projectName" value="demo-organism" />
        </label>
        <label>
          Job label
          <input id="jobLabel" name="jobLabel" value="integrated-run" />
        </label>
        <label>
          Organism
          <input
            id="query"
            name="query"
            value="preview train evaluate"
          />
        </label>
        <button type="submit">Create project + queued job</button>
      </form>
      <pre id="out" data-jobs-out="live">Ready.</pre>
    </main>
    <script>
      const tokenEl = document.getElementById("token");
      const saved = localStorage.getItem("ESD_token");
      if (saved) tokenEl.value = saved;

      document.getElementById("job-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = tokenEl.value.trim();
        const orgId = document.getElementById("orgId").value.trim();
        const projectName = document.getElementById("projectName").value.trim();
        const jobLabel = document.getElementById("jobLabel").value.trim();
        const query = document.getElementById("query").value.trim();
        const out = document.getElementById("out");
        if (!token || !orgId) {
          out.textContent = "Need bearer token and org id.";
          return;
        }
        localStorage.setItem("ESD_token", token);
        const headers = {
          "content-type": "application/json",
          authorization: "Bearer " + token,
        };
        try {
          const projectRes = await fetch("/orgs/" + orgId + "/projects", {
            method: "POST",
            headers,
            body: JSON.stringify({
              name: projectName,
              topic_label: "lab-demo",
              min_n_budget: 3,
            }),
          });
          const projectJson = await projectRes.json();
          if (!projectRes.ok) {
            out.textContent = JSON.stringify(projectJson, null, 2);
            return;
          }
          const projectId = projectJson.project.id;
          const jobRes = await fetch(
            "/orgs/" + orgId + "/projects/" + projectId + "/jobs",
            {
              method: "POST",
              headers,
              body: JSON.stringify({
                label: jobLabel,
                status: "queued",
                query,
                min_n: 2,
              }),
            },
          );
          const jobJson = await jobRes.json();
          out.textContent = JSON.stringify(
            { project: projectJson.project, job: jobJson.job || jobJson },
            null,
            2,
          );
        } catch (err) {
          out.textContent = String(err);
        }
      });
    </script>
  </body>
</html>

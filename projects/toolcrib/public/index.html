<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toolcrib</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Toolcrib</h1>
      <p class="lede">Stock a tool, checkout it, and checkin it.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@toolcrib.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Clip</h2>
        <label>Title <input id="title" type="text" value="Kickoff tools" /></label>
        <div class="row">
          <button type="button" id="create">Stock</button>
          <button type="button" id="checkout" disabled>Checkout</button>
          <button type="button" id="checkin" disabled>Checkin</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="tool-view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

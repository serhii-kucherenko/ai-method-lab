<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drug Discovery Desk — org settings</title>
    <style>
      body {
        margin: 0;
        font-family: "Source Sans 3", "Segoe UI", sans-serif;
        color: #1a2433;
        background: linear-gradient(180deg, #eef4f8, #e2ebf1);
        min-height: 100vh;
      }
      main {
        max-width: 40rem;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 3rem;
      }
      h1 {
        font-family: "Source Serif 4", Georgia, serif;
        margin: 0 0 0.5rem;
      }
      p {
        color: #4d5b6d;
        line-height: 1.5;
      }
      button {
        background: #1f5f8b;
        color: #fff;
        border: 0;
        padding: 0.5rem 1rem;
        cursor: pointer;
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
      }
      #settings-out {
        white-space: pre-wrap;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        background: #f3f7f9;
        border: 1px solid #c5d0dc;
        padding: 0.85rem 1rem;
        margin-top: 1rem;
      }
      a {
        color: #1f5f8b;
      }
      code {
        font-size: 0.9em;
      }
    </style>
  </head>
  <body data-settings="live">
    <main>
      <h1>Org settings</h1>
      <p>
        Admin-only webhook HMAC secret and token notes. Operators and viewers see
        redacted settings. Inbound signed posts use header
        <code>x-ddd-signature</code>.
      </p>
      <p>
        <button id="load-settings" type="button">Load settings</button>
        <button id="rotate-secret" type="button">Rotate webhook secret</button>
      </p>
      <pre id="settings-out">Load to view</pre>
      <p>
        <a href="/">Home</a> ·
        <a href="/jobs.html">Jobs</a> ·
        <a href="/honesty.html">Honesty</a>
      </p>
    </main>
    <script>
      (function () {
        const token = localStorage.getItem("DDD_token") || "";
        const orgId = localStorage.getItem("DDD_org") || "";
        const out = document.getElementById("settings-out");
        async function call(method, path, body) {
          const res = await fetch(path, {
            method,
            headers: {
              "content-type": "application/json",
              authorization: "Bearer " + token,
            },
            body: body ? JSON.stringify(body) : undefined,
          });
          out.textContent = JSON.stringify(await res.json(), null, 2);
        }
        document.getElementById("load-settings").onclick = function () {
          if (!token || !orgId) {
            out.textContent = "Need DDD_token and DDD_org in localStorage.";
            return;
          }
          call("GET", "/orgs/" + orgId + "/settings");
        };
        document.getElementById("rotate-secret").onclick = function () {
          if (!token || !orgId) {
            out.textContent = "Need DDD_token and DDD_org in localStorage.";
            return;
          }
          call("PATCH", "/orgs/" + orgId + "/settings", {
            rotate_webhook_secret: true,
          });
        };
      })();
    </script>
  </body>
</html>

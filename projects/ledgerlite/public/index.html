<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ledgerlite</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Ledgerlite</h1>
      <p class="lede">Log an entry, submit it for review, and approve it.</p>
      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@ledgerlite.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>
      <section id="flow" hidden>
        <h2>Entry</h2>
        <label>Memo <input id="memo" type="text" value="Coffee" /></label>
        <label>Amount <input id="amount" type="number" value="-4.5" step="0.01" /></label>
        <div class="row">
          <button type="button" id="create">Create draft</button>
          <button type="button" id="submit" disabled>Submit</button>
          <button type="button" id="approve" disabled>Approve</button>
        </div>
        <p id="flow-status" class="status"></p>
        <pre id="entry-view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settlecut</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Settlecut</h1>
      <p>Loss-adjusted interval imbalance (method stress).</p>
      <label>Meter kWh <input id="meter" type="number" value="100" /></label>
      <label>Schedule kWh <input id="sched" type="number" value="98" /></label>
      <label>Delivery factor <input id="df" type="number" step="0.01" value="0.98" /></label>
      <button id="go" type="button">Settle</button>
      <pre id="out"></pre>
    </main>
    <script src="/app.js"></script>
  </body>
</html>

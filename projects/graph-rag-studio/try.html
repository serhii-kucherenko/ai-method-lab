<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graph RAG Studio — try</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --teal: #0f766e;
      --ink: #0f172a;
      --line: #d6e0e5;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse 70% 40% at 15% 0%, #d8f3ef, transparent),
        var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    main { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    h1 { font-family: Georgia, serif; color: #115e59; font-size: 2rem; margin: 0 0 0.5rem; }
    .tag { color: #475569; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; margin-top: 0.75rem; }
    input { width: 100%; padding: 0.45rem 0.6rem; border: 1px solid var(--line); border-radius: 6px; box-sizing: border-box; }
    button {
      margin-top: 1rem; background: var(--teal); color: #f0fdfa; border: 0;
      padding: 0.55rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    .grid { display: grid; gap: 1rem; grid-template-columns: 1fr 1fr; margin-top: 1.25rem; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 1rem; }
    .score { font-size: 1.75rem; font-weight: 600; }
    .note { margin-top: 1.5rem; font-size: 0.9rem; color: #475569; }
    a { color: var(--teal); }
  </style>
</head>
<body>
  <main>
    <h1>Graph RAG Studio</h1>
    <p class="tag">Offline demo — multi-step vs single-shot graph quality (approximate).</p>
    <label>Duplicate rate (0–1) <input id="dup" type="number" step="0.05" value="0.4" /></label>
    <label>Weak edges <input id="weak" type="number" value="22" /></label>
    <label>Strong edges <input id="strong" type="number" value="48" /></label>
    <label>Query coverage (0–1) <input id="cov" type="number" step="0.05" value="0.8" /></label>
    <button type="button" id="run">Compare</button>
    <div class="grid">
      <div class="card">
        <div>Multi-step</div>
        <div class="score" id="ms">—</div>
      </div>
      <div class="card">
        <div>Single-shot</div>
        <div class="score" id="ss">—</div>
      </div>
    </div>
    <p id="winner" class="note"></p>
    <p class="note">
      Honesty: Method Lab soft demo. Not RAGU / Meno-Lite.
      Paper: <a href="https://arxiv.org/abs/2607.11683v1">arXiv 2607.11683</a>
    </p>
  </main>
  <script>
    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
    function round2(n) { return Math.round(n * 100) / 100; }
    function multiStep(dup, weak, strong, cov) {
      const extract = 72;
      const consolidate = round2(clamp(40 + 0.6 * 35 + (1 - dup) * 20 + Math.min(15, strong * 0.4), 0, 100));
      const retrieval = round2(clamp(cov * 75 + 15 + (strong / Math.max(1, strong + weak)) * 15, 0, 100));
      return round2(extract * 0.25 + consolidate * 0.4 + retrieval * 0.35);
    }
    function singleShot(dup, weak, strong, cov) {
      const extract = 78;
      const consolidate = round2(clamp(25 + (1 - dup) * 10 + Math.min(20, (strong + weak) * 0.15), 0, 70));
      const retrieval = round2(clamp(cov * 55 + 6 + Math.max(0, 20 - weak * 0.5), 0, 100));
      return round2(extract * 0.45 + consolidate * 0.2 + retrieval * 0.35);
    }
    function run() {
      const dup = Number(document.getElementById("dup").value);
      const weak = Number(document.getElementById("weak").value);
      const strong = Number(document.getElementById("strong").value);
      const cov = Number(document.getElementById("cov").value);
      const ms = multiStep(dup, weak, strong, cov);
      const ss = singleShot(dup, weak, strong, cov);
      document.getElementById("ms").textContent = ms;
      document.getElementById("ss").textContent = ss;
      document.getElementById("winner").textContent =
        ms > ss ? "Winner: multi-step consolidation" :
        ss > ms ? "Winner: single-shot (unusual)" : "Tie";
    }
    document.getElementById("run").onclick = run;
    run();
  </script>
</body>
</html>

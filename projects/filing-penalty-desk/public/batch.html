<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Filing Penalty Desk — batch forecast</title>
    <style>
      body {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 2rem 1.25rem;
        max-width: 40rem;
        margin-inline: auto;
        color: #1a2228;
        background: #eef2f4;
      }
      textarea { width: 100%; min-height: 6rem; box-sizing: border-box; }
      button {
        margin-top: 0.75rem;
        background: #1f5f6b;
        color: #fff;
        border: 0;
        padding: 0.6rem 1.1rem;
        cursor: pointer;
      }
      #batch-results { list-style: none; padding: 0; }
      #batch-results li { padding: 0.5rem 0; border-bottom: 1px solid #d0d8dc; }
      a { color: #1f5f6b; }
    </style>
  </head>
  <body>
    <h1>Batch forecast</h1>
    <p>Each return timeline runs independently. One reject does not rewrite siblings.</p>
    <p id="status">Provide token and org, then run.</p>
    <textarea id="timeline-ids" placeholder="uuid-1&#10;uuid-2"></textarea>
    <br />
    <button id="run-batch" type="button">Run batch</button>
    <ul id="batch-results" data-batch="live"></ul>
    <p>
      <a href="/returns.html">Catalog</a> ·
      <a href="/audit.html">Audit</a> ·
      <a href="/honesty.html">Honesty</a>
    </p>
    <script>
      (function () {
        const token = localStorage.getItem("fpd_token") || "";
        const orgId = localStorage.getItem("fpd_org") || "";
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("batch-results");
        document.getElementById("run-batch").onclick = function () {
          if (!token || !orgId) {
            statusEl.textContent = "Set fpd_token and fpd_org in localStorage.";
            return;
          }
          const ids = document
            .getElementById("timeline-ids")
            .value.split(/[\s,]+/)
            .filter(Boolean);
          fetch("/orgs/" + encodeURIComponent(orgId) + "/batch/forecast", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              authorization: "Bearer " + token,
            },
            body: JSON.stringify({ timeline_ids: ids }),
          })
            .then(function (r) {
              if (r.status === 429) {
                statusEl.textContent = "Rate limited (429). Wait and retry.";
                return null;
              }
              return r.json();
            })
            .then(function (j) {
              if (!j) return;
              statusEl.textContent = "Batch " + (j.batch_id || "") + " done.";
              listEl.innerHTML = "";
              (j.results || []).forEach(function (row) {
                const li = document.createElement("li");
                li.textContent = JSON.stringify(row);
                listEl.appendChild(li);
              });
            })
            .catch(function (e) {
              statusEl.textContent = String(e);
            });
        };
      })();
    </script>
  </body>
</html>

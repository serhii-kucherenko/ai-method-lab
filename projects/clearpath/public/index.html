<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clearpath</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Clearpath</h1>
      <p class="lede">Submit a request, send it for review, and approve it.</p>

      <section id="auth">
        <h2>Sign in</h2>
        <label>Email <input id="email" type="email" value="demo@clearpath.local" /></label>
        <label>Password <input id="password" type="password" value="demo" /></label>
        <div class="row">
          <button type="button" id="register">Register</button>
          <button type="button" id="login">Log in</button>
        </div>
        <p id="auth-status" class="status" aria-live="polite"></p>
      </section>

      <section id="flow" hidden>
        <h2>Request</h2>
        <label>Title <input id="title" type="text" value="Team lunch reimbursement" /></label>
        <label>Details <textarea id="body">Receipt attached offline.</textarea></label>
        <div class="row">
          <button type="button" id="create">Create draft</button>
          <button type="button" id="submit" disabled>Submit for review</button>
          <button type="button" id="approve" disabled>Approve</button>
        </div>
        <p id="flow-status" class="status" aria-live="polite"></p>
        <pre id="request-view"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bondstrip</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Bondstrip</h1>
      <p>Day-count accrued + cashflow strip (method stress).</p>
      <label>Day count
        <select id="dc">
          <option>30/360</option>
          <option>ACT/ACT</option>
        </select>
      </label>
      <label>Face <input id="face" type="number" value="1000" /></label>
      <label>Coupon rate <input id="rate" type="number" step="0.01" value="0.06" /></label>
      <label>Freq <input id="freq" type="number" value="2" /></label>
      <label>Prev <input id="prev" type="text" value="2026-01-15" /></label>
      <label>Next <input id="next" type="text" value="2026-07-15" /></label>
      <label>Settle <input id="settle" type="text" value="2026-04-15" /></label>
      <button id="go" type="button">Accrue</button>
      <pre id="out"></pre>
    </main>
    <script src="/app.js"></script>
  </body>
</html>

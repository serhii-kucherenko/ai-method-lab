<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oshamult — Goldens</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem 1.5rem;
        background: #eef2f5;
        color: #1c2430;
      }
      .brand { color: #1f5f8b; font-weight: 700; font-size: 1.5rem; }
      a { color: #1f5f8b; }
      #cards { max-width: 42rem; }
      .card {
        padding: 0.75rem 0;
        border-bottom: 1px solid #c5ced8;
      }
      .pass { color: #1a6b4a; }
      .fail { color: #8a3b2c; }
    </style>
  </head>
  <body data-goldens="live">
    <div class="brand">Oshamult</div>
    <h1>Goldens browser</h1>
    <p>
      Read-only FOM-shaped fixtures. Kill A: forecast / method experiment — not OIS
      parity.
    </p>
    <p id="status">Loading…</p>
    <div id="cards"></div>
    <p>
      <a href="/money-honesty.html">Money honesty</a> ·
      <a href="/citations.html">Citations catalog</a>
    </p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token =
          params.get("token") || localStorage.getItem("oshamult_token") || "";
        const orgId =
          params.get("orgId") || localStorage.getItem("oshamult_orgId") || "";
        const statusEl = document.getElementById("status");
        const cardsEl = document.getElementById("cards");
        if (!token || !orgId) {
          statusEl.textContent =
            "Stub: set oshamult_token + oshamult_orgId to load /orgs/:id/goldens.";
          return;
        }
        fetch("/orgs/" + encodeURIComponent(orgId) + "/goldens", {
          headers: { Authorization: "Bearer " + token },
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            statusEl.textContent =
              (j.total || 0) + " goldens · all_pass=" + j.all_pass;
            cardsEl.innerHTML = (j.cards || [])
              .map(function (c) {
                return (
                  "<div class='card'><strong>" +
                  c.id +
                  "</strong> " +
                  (c.pass
                    ? "<span class='pass'>pass</span>"
                    : "<span class='fail'>fail</span>") +
                  "<div>" +
                  (c.title || "") +
                  "</div></div>"
                );
              })
              .join("");
          })
          .catch(function () {
            statusEl.textContent = "Load failed";
          });
      })();
    </script>
  </body>
</html>

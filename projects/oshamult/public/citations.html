<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oshamult — Citations catalog</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem 1.5rem;
        background: #eef2f5;
        color: #1c2430;
      }
      .brand { color: #1f5f8b; font-weight: 700; font-size: 1.5rem; }
      h1 { font-size: 1.2rem; }
      a { color: #1f5f8b; }
      #status { color: #4d5a6a; margin: 1rem 0; }
      #citations-list {
        list-style: none;
        padding: 0;
        margin: 1rem 0;
        max-width: 40rem;
      }
      #citations-list li {
        padding: 0.75rem 0;
        border-bottom: 1px solid #c5ced8;
      }
      .meta { font-size: 0.9rem; color: #4d5a6a; }
    </style>
  </head>
  <body>
    <div class="brand">Oshamult</div>
    <h1>Citations catalog</h1>
    <p>Org-scoped citation forecasts. Token from localStorage or <code>?token=</code> stub.</p>
    <p id="status">Loading…</p>
    <ul id="citations-list" data-catalog="live"></ul>
    <p>
      <a href="/money-honesty.html">Money honesty</a> ·
      <a href="/citation-detail.html">Citation detail</a> ·
      <a href="/goldens.html">Goldens</a>
    </p>
    <p>
      Kill A: consultants and settlement counsel still model. This is a forecast /
      method experiment — not an OSHA / OIS replacement.
    </p>
    <script>
      (function () {
        const params = new URLSearchParams(location.search);
        const token =
          params.get("token") ||
          localStorage.getItem("oshamult_token") ||
          "";
        const orgId =
          params.get("orgId") ||
          localStorage.getItem("oshamult_orgId") ||
          "";
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("citations-list");

        if (!token || !orgId) {
          statusEl.textContent =
            "Stub mode: set oshamult_token + oshamult_orgId in localStorage (or ?token=&orgId=) to load /orgs/:id/citations.";
          listEl.innerHTML =
            "<li class='meta'>Catalog ready — Bearer Authorization required for live list.</li>";
          return;
        }

        fetch("/orgs/" + encodeURIComponent(orgId) + "/citations", {
          headers: { Authorization: "Bearer " + token },
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, j: j };
            });
          })
          .then(function (res) {
            if (!res.ok) {
              statusEl.textContent = "Load failed";
              return;
            }
            const rows = res.j.citations || [];
            statusEl.textContent = rows.length + " citation(s)";
            listEl.innerHTML = rows
              .map(function (c) {
                return (
                  "<li><strong>" +
                  (c.classification || "") +
                  "</strong> · GBP $" +
                  c.gbp_amount +
                  "<div class='meta'>" +
                  c.id +
                  "</div></li>"
                );
              })
              .join("");
          })
          .catch(function () {
            statusEl.textContent = "Network error";
          });
      })();
    </script>
  </body>
</html>
